<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed — Study Material Shop</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #ff6ec7;
      --rose:    #ff3fa4;
      --purple:  #b96eff;
      --violet:  #7c3aed;
      --deep:    #0d0010;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,110,199,0.18);
    }

    html, body {
      height: 100%;
      background: var(--deep);
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .bg-orb:nth-child(1){ width:520px;height:520px;background:radial-gradient(circle,#b96eff,transparent 70%);top:-160px;left:-120px;animation-duration:9s; }
    .bg-orb:nth-child(2){ width:420px;height:420px;background:radial-gradient(circle,#ff3fa4,transparent 70%);bottom:-100px;right:-100px;animation-duration:11s;animation-delay:-3s; }
    .bg-orb:nth-child(3){ width:300px;height:300px;background:radial-gradient(circle,#ff6ec7,transparent 70%);top:40%;left:55%;animation-duration:7s;animation-delay:-1s; }
    @keyframes drift { from{transform:translate(0,0) scale(1);} to{transform:translate(30px,40px) scale(1.08);} }

    /* ── PARTICLES ── */
    #particles { position:fixed;inset:0;z-index:1;pointer-events:none; }

    /* ── PAGE ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-radius: 28px;
      padding: 3rem 2.5rem 2.8rem;
      max-width: 520px; width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(185,110,255,0.08),
        0 8px 60px rgba(185,110,255,0.18),


        
        0 2px 8px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.07);
      opacity: 0;
      transform: translateY(40px) scale(0.96);
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    @keyframes cardIn {
      to { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── CHECKMARK ── */
    .check-wrap {
      position: relative;
      width: 110px; height: 110px;
      margin: 0 auto 2rem;
    }
    .check-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      background:
        linear-gradient(var(--deep),var(--deep)) padding-box,
        linear-gradient(135deg,var(--pink),var(--purple)) border-box;
      animation: ringPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
    }
    @keyframes ringPop {
      from { transform:scale(0); opacity:0; }
      to   { transform:scale(1); opacity:1; }
    }
    .check-glow {
      position:absolute;inset:-8px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,110,199,0.35) 0%, transparent 70%);
      animation: glowPulse 2.5s ease-in-out 1.2s infinite;
    }
    @keyframes glowPulse {
      0%,100%{ opacity:0.6; transform:scale(1);   }
      50%    { opacity:1;   transform:scale(1.15); }
    }
    .check-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .check-icon svg {
      width: 52px; height: 52px;
      overflow: visible;
    }
    .check-path {
      stroke: url(#checkGrad);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: drawCheck 0.6s ease 1.2s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* ── BURST STARS ── */
    .burst { position:absolute;inset:0;pointer-events:none; }
    .star {
      position:absolute; top:50%; left:50%;
      width:6px; height:6px; border-radius:50%;
      background: var(--pink);
      opacity:0;
      animation: starBurst 0.7s ease-out 1.4s forwards;
    }
    .star:nth-child(2){background:var(--purple);animation-delay:1.45s;}
    .star:nth-child(3){background:#fff;animation-delay:1.5s;}
    .star:nth-child(4){background:var(--rose);animation-delay:1.42s;}
    .star:nth-child(5){background:var(--purple);animation-delay:1.48s;}
    .star:nth-child(6){background:var(--pink);animation-delay:1.52s;}
    @keyframes starBurst {
      0%  { opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(1); }
      100%{ opacity:0; transform:translate(-50%,-50%) var(--tx) scale(0.2); }
    }
    .star:nth-child(1){ --tx:translate(50px,-55px); }
    .star:nth-child(2){ --tx:translate(-60px,-40px); }
    .star:nth-child(3){ --tx:translate(65px,20px); }
    .star:nth-child(4){ --tx:translate(-45px,55px); }
    .star:nth-child(5){ --tx:translate(15px,65px); }
    .star:nth-child(6){ --tx:translate(-70px,10px); }

    /* ── TEXT ── */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5vw, 2.6rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 20%, var(--pink) 60%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.6s forwards;
    }
    .sub {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.65);
      font-weight: 300;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.8s forwards;
    }
    @keyframes fadeUp {
      from{ opacity:0; transform:translateY(12px); }
      to  { opacity:1; transform:translateY(0); }
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 2rem 0;
      opacity: 0;
      animation: fadeIn 0.5s ease 2s forwards;
    }

    /* ── EMAIL BOX ── */
    .email-box {
      background: rgba(185,110,255,0.08);
      border: 1px solid rgba(185,110,255,0.22);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 2.1s forwards;
    }
    .email-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
      animation: wobble 2s ease 2.8s infinite;
    }
    @keyframes wobble {
      0%,100%{ transform:rotate(0deg); }
      20%    { transform:rotate(-12deg); }
      40%    { transform:rotate(10deg); }
      60%    { transform:rotate(-6deg); }
      80%    { transform:rotate(4deg); }
    }
    .email-text { text-align:left; }
    .email-text strong {
      display:block;
      font-size:0.95rem;
      color:#fff;
      margin-bottom:0.2rem;
    }
    .email-text span {
      font-size:0.82rem;
      color:rgba(255,255,255,0.5);
    }

    /* ── TIMER BADGE ── */
    .timer-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, rgba(255,63,164,0.15), rgba(124,58,237,0.15));
      border: 1px solid rgba(255,110,199,0.25);
      border-radius: 99px;
      padding: 0.55rem 1.2rem;
      font-size: 0.88rem;
      color: var(--pink);
      font-weight: 500;
      margin-top: 1.4rem;
      opacity: 0;
      animation: fadeIn 0.6s ease 2.4s forwards;
    }
    .timer-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--pink);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    /* ── CTA ── */
    .cta {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.85rem 2.2rem;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 24px rgba(255,63,164,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeIn 0.6s ease 2.7s forwards;
    }
    .cta:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 36px rgba(255,63,164,0.5);
    }

    @keyframes fadeIn {
      from{ opacity:0; } to{ opacity:1; }
    }

    /* ── FLOATING PETALS ── */
    .petal {
      position: fixed;
      border-radius: 50% 10% 50% 10%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%  { opacity:0; transform: translateY(-20px) rotate(0deg) scale(0.8); }
      10% { opacity:0.7; }
      90% { opacity:0.4; }
      100%{ opacity:0; transform: translateY(110vh) rotate(720deg) scale(1.1); }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>

  <!-- Particle canvas -->
  <canvas id="particles"></canvas>

  <!-- Main -->
  <div class="page">
    <div class="card">

      <!-- Animated checkmark -->
      <div class="check-wrap">
        <div class="check-ring"></div>
        <div class="check-glow"></div>
        <div class="burst">
          <span class="star"></span><span class="star"></span>
          <span class="star"></span><span class="star"></span>
          <span class="star"></span><span class="star"></span>
        </div>
        <div class="check-icon">
          <svg viewBox="0 0 52 52">
            <defs>
              <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff6ec7"/>
                <stop offset="100%" stop-color="#b96eff"/>
              </linearGradient>
            </defs>
            <polyline class="check-path" points="10,27 21,38 42,16"/>
          </svg>
        </div>
      </div>

      <h1 class="headline">Order Placed!<br>You're all set ✨</h1>
      <p class="sub">Thank you for your purchase. Your study materials<br>are on their way to your inbox.</p>

      <div class="divider"></div>

      <!-- Email notification box -->
      <div class="email-box">
        <div class="email-icon">💌</div>
        <div class="email-text">
          <strong>We'll contact you within 24 hours</strong>
          <span>Payment details &amp; your materials will be sent to your email address.</span>
        </div>
      </div>

      <!-- Live indicator -->
      <div class="timer-badge">
        <span class="dot"></span>
        Delivery within 24 hours of payment
      </div>

      <a href="index.html" class="cta">← Back to Shop</a>
    </div>
  </div>

  <script>
  // ── SPARKLE PARTICLES ──
  (function () {
    var canvas = document.getElementById('particles');
    var ctx = canvas.getContext('2d');
    var W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    var colors = ['#ff6ec7','#b96eff','#ff3fa4','#ffffff','#e879f9'];

    function Particle() {
      this.reset();
    }
    Particle.prototype.reset = function () {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.r = Math.random() * 2.2 + 0.4;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.alpha = Math.random() * 0.6 + 0.1;
      this.dy = -(Math.random() * 0.4 + 0.1);
      this.dx = (Math.random() - 0.5) * 0.3;
      this.life = Math.random() * 200 + 80;
      this.age = 0;
    };
    Particle.prototype.update = function () {
      this.x += this.dx;
      this.y += this.dy;
      this.age++;
      if (this.age > this.life) this.reset();
    };
    Particle.prototype.draw = function () {
      ctx.save();
      ctx.globalAlpha = this.alpha * (1 - this.age / this.life);
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    };

    for (var i = 0; i < 110; i++) particles.push(new Particle());

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(function (p) { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  })();

  // ── FLOATING PETALS ──
  (function () {
    var colors = [
      'rgba(255,110,199,0.55)',
      'rgba(185,110,255,0.45)',
      'rgba(255,63,164,0.5)',
      'rgba(233,121,249,0.4)'
    ];
    for (var i = 0; i < 18; i++) {
      (function (i) {
        var el = document.createElement('div');
        el.className = 'petal';
        var size = Math.random() * 10 + 6;
        el.style.cssText = [
          'width:' + size + 'px',
          'height:' + size + 'px',
          'left:' + Math.random() * 100 + 'vw',
          'top:-30px',
          'background:' + colors[Math.floor(Math.random() * colors.length)],
          'animation-duration:' + (Math.random() * 8 + 7) + 's',
          'animation-delay:' + (Math.random() * 6) + 's',
        ].join(';');
        document.body.appendChild(el);
      })(i);
    }
  })();

  // ── CONFETTI BURST on load ──
  (function () {
    var confettiColors = ['#ff6ec7','#b96eff','#ff3fa4','#fff','#e879f9','#7c3aed'];
    var pieces = [];
    var canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;z-index:99;pointer-events:none;';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function Piece() {
      this.x = window.innerWidth / 2;
      this.y = window.innerHeight * 0.42;
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 9 + 4;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 5;
      this.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      this.w = Math.random() * 10 + 5;
      this.h = Math.random() * 5 + 3;
      this.rot = Math.random() * Math.PI;
      this.rotV = (Math.random() - 0.5) * 0.2;
      this.alpha = 1;
      this.gravity = 0.18;
    }
    Piece.prototype.update = function () {
      this.vy += this.gravity;
      this.x += this.vx;
      this.y += this.vy;
      this.rot += this.rotV;
      this.alpha -= 0.012;
    };
    Piece.prototype.draw = function () {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle = this.color;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
      ctx.restore();
    };

    var started = false;
    function burst() {
      if (started) return;
      started = true;
      for (var i = 0; i < 120; i++) pieces.push(new Piece());
      function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces = pieces.filter(function (p) { return p.alpha > 0; });
        pieces.forEach(function (p) { p.update(); p.draw(); });
        if (pieces.length) requestAnimationFrame(frame);
        else canvas.remove();
      }
      frame();
    }

    // Fire after checkmark finishes drawing
    setTimeout(burst, 1500);
  })();
  </script>
</body>
</html>
