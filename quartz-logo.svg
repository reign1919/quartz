<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Deep black background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0010;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#08000d;stop-opacity:1" />
    </linearGradient>

    <!-- Gem facet gradients -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a020c8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="faceLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a0060;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2185b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="faceBottomLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d0040;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="faceBottomRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ad1457;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c0035;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="faceMidLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e24aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a0072;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="faceMidRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e8c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#880e4f;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner glow on top facet -->
    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circle">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Gem crystal shape — centered, clipped to circle -->
  <!-- Crystal geometry: hexagonal gem, top crown + bottom pavilion -->
  <!-- Gem center: 50, 50. Crown top: 50,14. Width 34 each side. Girdle at y=48. Culet at y=84 -->

  <g clip-path="url(#circle)" filter="url(#glow)">

    <!-- === CROWN (top half) === -->

    <!-- Top table facet (brightest, center top) -->
    <polygon points="38,28 62,28 67,40 33,40" fill="url(#faceTop)" opacity="0.97"/>

    <!-- Left upper crown facet -->
    <polygon points="26,38 38,28 33,40" fill="url(#faceMidLeft)" opacity="0.9"/>

    <!-- Right upper crown facet -->
    <polygon points="74,38 62,28 67,40" fill="url(#faceMidRight)" opacity="0.9"/>

    <!-- Far left crown bezel -->
    <polygon points="19,50 26,38 33,40 30,50" fill="url(#faceLeft)" opacity="0.85"/>

    <!-- Far right crown bezel -->
    <polygon points="81,50 74,38 67,40 70,50" fill="url(#faceRight)" opacity="0.85"/>

    <!-- Left lower crown -->
    <polygon points="30,50 33,40 50,44 50,52" fill="url(#faceMidLeft)" opacity="0.78"/>

    <!-- Right lower crown -->
    <polygon points="70,50 67,40 50,44 50,52" fill="url(#faceMidRight)" opacity="0.78"/>

    <!-- Girdle line hint -->
    <line x1="19" y1="50" x2="81" y2="50" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

    <!-- === PAVILION (bottom half) === -->

    <!-- Left pavilion -->
    <polygon points="19,50 30,50 50,52 50,80" fill="url(#faceBottomLeft)" opacity="0.88"/>

    <!-- Right pavilion -->
    <polygon points="81,50 70,50 50,52 50,80" fill="url(#faceBottomRight)" opacity="0.88"/>

    <!-- Far left bottom -->
    <polygon points="19,50 50,80 36,82" fill="url(#faceLeft)" opacity="0.7"/>

    <!-- Far right bottom -->
    <polygon points="81,50 50,80 64,82" fill="url(#faceRight)" opacity="0.7"/>

    <!-- Bottom tip culet -->
    <polygon points="36,82 50,80 64,82 50,88" fill="url(#faceTop)" opacity="0.6"/>

  </g>

  <!-- Gem outline for crispness -->
  <g clip-path="url(#circle)" opacity="0.25">
    <!-- Crown outline -->
    <polyline points="26,38 38,28 62,28 74,38 81,50 70,50 67,40 62,28" fill="none" stroke="white" stroke-width="0.4"/>
    <polyline points="26,38 33,40 38,28" fill="none" stroke="white" stroke-width="0.4"/>
    <line x1="33" y1="40" x2="67" y2="40" stroke="white" stroke-width="0.4"/>
    <line x1="33" y1="40" x2="50" y2="44" stroke="white" stroke-width="0.4"/>
    <line x1="67" y1="40" x2="50" y2="44" stroke="white" stroke-width="0.4"/>
    <!-- Pavilion outline -->
    <polyline points="19,50 30,50 50,52 70,50 81,50 50,88 19,50" fill="none" stroke="white" stroke-width="0.4"/>
    <line x1="50" y1="52" x2="50" y2="80" stroke="white" stroke-width="0.4"/>
    <line x1="30" y1="50" x2="50" y2="80" stroke="white" stroke-width="0.3"/>
    <line x1="70" y1="50" x2="50" y2="80" stroke="white" stroke-width="0.3"/>
  </g>

  <!-- Specular highlight — top left glint -->
  <ellipse cx="44" cy="33" rx="5" ry="2.5" fill="white" opacity="0.22" transform="rotate(-15, 44, 33)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(180,60,255,0.3)" stroke-width="1"/>
  <circle cx="50" cy="50" r="49" fill="none" stroke="rgba(255,61,143,0.1)" stroke-width="0.5"/>

</svg>
